<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Iniciando aplicación...</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
font-family:Arial, Helvetica, sans-serif;
color:white;
overflow:hidden;
}

.container{
text-align:center;
max-width:500px;
}

.logo{
font-size:28px;
font-weight:bold;
letter-spacing:1px;
margin-bottom:20px;
}

.subtitle{
opacity:0.8;
margin-bottom:40px;
}

.loader{
width:70px;
height:70px;
border-radius:50%;
border:6px solid rgba(255,255,255,0.1);
border-top:6px solid #38bdf8;
animation:spin 1s linear infinite;
margin:auto;
margin-bottom:30px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.progress-container{
width:100%;
height:8px;
background:rgba(255,255,255,0.1);
border-radius:10px;
overflow:hidden;
margin-top:25px;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#38bdf8,#22c55e);
animation:progress 20s linear forwards;
}

@keyframes progress{
0%{width:0%;}
100%{width:90%;}
}

.status{
margin-top:20px;
font-size:14px;
opacity:0.8;
}

.footer{
position:absolute;
bottom:20px;
font-size:12px;
opacity:0.4;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
Algoritmos UTN
</div>

<div class="subtitle">
Preparando el servidor para iniciar la aplicación
</div>

<div class="loader"></div>

<div class="progress-container">
<div class="progress-bar"></div>
</div>

<div class="status" id="status">
Despertando servidor...
</div>

</div>

<div class="footer">
Esto puede tardar unos segundos si el servidor estaba dormido
</div>

<script>

const nuevaUrl = "https://servidormultiusuario-production.up.railway.app/";
const antiguaUrl = "https://algoritmos2.clasesparticularesutn.com.ar";

async function checkServer(){

try{

document.getElementById("status").innerText = "Verificando nuevo servidor...";

const resNueva = await fetch(nuevaUrl,{
mode:"no-cors"
});

document.getElementById("status").innerText = "Servidor listo. Redirigiendo...";

setTimeout(()=>{
window.location.href = nuevaUrl;
},1000);

}
catch(e){

try{

document.getElementById("status").innerText = "Verificando servidor alternativo...";

const resAntigua = await fetch(antiguaUrl,{
mode:"no-cors"
});

document.getElementById("status").innerText = "Servidor listo. Redirigiendo...";

setTimeout(()=>{
window.location.href = antiguaUrl;
},1000);

}
catch(e2){

document.getElementById("status").innerText = "Iniciando servidor...";

}

}

}

setInterval(checkServer,2000);

</script>

</body>
</html>
