<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clases Particulares UTN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
/* ====== TODO TU CSS ORIGINAL INTACTO ====== */
:root {
--primary:#f3a661; 
--primary-dark:#d48b45;
--warning:#e67e22;
--bg:#1a1a24;
--header-bg:rgba(37,37,51,0.95);
--card-bg:#252533;
--text-main:#e2e2e8;
--text-muted:#b0b0b8;
--glass-border:rgba(243,166,97,0.25);
--shadow:0 4px 12px rgba(0,0,0,0.3);
--footer-bg:rgba(37,37,51,0.98);
}
body.light-mode {
--bg:#f0f4f8;
--header-bg:rgba(255,255,255,0.95);
--card-bg:#fff;
--text-main:#1a1a24;
--text-muted:#64748b;
--glass-border:rgba(243,166,97,0.4);
--shadow:0 4px 12px rgba(0,0,0,0.08);
--footer-bg:rgba(255,255,255,0.98);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text-main);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
header{background:var(--header-bg);backdrop-filter:blur(15px);padding:20px;text-align:center;border-bottom:1px solid var(--glass-border);position:sticky;top:0;z-index:1000;display:flex;align-items:center;}
header h1{flex-grow:1;}
.theme-toggle{background:rgba(243,166,97,0.1);border:1px solid var(--glass-border);color:var(--primary);width:40px;height:40px;border-radius:12px;cursor:pointer;}
.loader{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);display:flex;justify-content:center;align-items:center;z-index:9999;flex-direction:column;gap:20px;}
.loader.hidden{display:none;}
.spinner{border:4px solid rgba(243,166,97,0.1);border-top:4px solid var(--primary);border-radius:50%;width:50px;height:50px;animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.container{max-width:600px;margin:0 auto;padding:0 15px 140px;}
.card{display:flex;justify-content:space-between;background:var(--card-bg);border-radius:18px;padding:18px;border:1px solid var(--glass-border);margin-top:15px;box-shadow:var(--shadow);}
.footer-bar{position:fixed;bottom:0;left:0;width:100%;background:var(--footer-bg);padding:15px 0 35px;display:none;border-top:1px solid var(--glass-border);}
.footer-content{max-width:600px;margin:0 auto;padding:0 25px;display:flex;justify-content:space-between;align-items:center;}
button.btn-pago{background:var(--primary);color:#1a1a24;border:none;border-radius:16px;padding:14px 28px;font-size:1rem;font-weight:700;cursor:pointer;transition:.3s;}
button.btn-pago:hover{transform:scale(1.05);}

/* ===== MODAL QR NUEVO ===== */
.qr-modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
z-index:99999;
}
.qr-box{
background:var(--card-bg);
padding:30px;
border-radius:20px;
text-align:center;
max-width:320px;
}
.qr-box img{width:230px;margin:15px 0;}
</style>
</head>

<body>

<header>
<div style="width:40px;"></div>
<h1>Registro de pagos</h1>
<button class="theme-toggle" onclick="toggleTheme()">
<i id="theme-icon" class="fas fa-sun"></i>
</button>
</header>

<div class="container">

<div id="loaderClases" class="loader">
<div class="spinner"></div>
<p>Buscando clases pendientes...</p>
</div>

<div id="loaderPago" class="loader hidden">
<div class="spinner"></div>
<p>Generando pago...</p>
</div>

<div id="productos"></div>

</div>

<div class="footer-bar" id="totalContainer">
<div class="footer-content">
<div>
<div style="font-size:.8rem;color:var(--text-muted);font-weight:600;">TOTAL</div>
<div style="font-size:1.5rem;font-weight:900;">$<span id="total">0</span></div>
</div>

<div style="display:flex;gap:8px">
<button class="btn-pago" onclick="pagarSeleccion()">MercadoPago</button>
<button class="btn-pago" onclick="pagarQR()">QR</button>
</div>

</div>
</div>

<!-- MODAL QR -->
<div class="qr-modal" id="qrModal">
<div class="qr-box">
<h2>Escaneá para pagar</h2>
<img id="qrImg">
<div style="font-weight:800">Total: $<span id="qrTotal"></span></div>
<button class="btn-pago" onclick="cerrarQR()" style="margin-top:15px">Cerrar</button>
</div>
</div>

<script>
const sessionData=sessionStorage.getItem("persona");
let Alumno=sessionData?JSON.parse(sessionData):null;
if(!Alumno) location.href="/Horarios/Login/Login.html";

const correoAlumno=Alumno.correoElectronico;

const GAS_URL="https://script.google.com/macros/s/AKfycbwvSTFpClvlYupAvfgpR7YTvd90x7AN0t4EJZ5x7xarJ-ga1wRtWxNTDDy-Wm4judEX/exec";
const BACKEND="https://mercadopago-di7q.onrender.com";

let clases=[];

function toggleTheme(){
document.body.classList.toggle("light-mode");
}

async function cargarClases(){
document.getElementById("loaderClases").classList.remove("hidden");
const res=await fetch(`${GAS_URL}?funcion=devolverDeuda&correo=${correoAlumno}`);
const data=await res.json();

clases=data.map((c,i)=>({
id:i,
fecha:c.fecha,
modalidad:c.modalidad,
horas:c.horas,
precioEditado:parseFloat(c.precio),
codigo:c.codigo
}));

mostrarClases();
document.getElementById("loaderClases").classList.add("hidden");
}

function mostrarClases(){
const cont=document.getElementById("productos");
cont.innerHTML="";
clases.forEach(c=>{
const card=document.createElement("div");
card.className="card";
card.innerHTML=`
<div>
<strong>${c.modalidad}</strong>
<div>${c.fecha} | ${c.horas} hs</div>
</div>
<div>
<div>$${c.precioEditado}</div>
<input type="checkbox" value="${c.id}" onchange="actualizarTotal()">
</div>`;
cont.appendChild(card);
});
}

function actualizarTotal(){
let total=0,sel=false;
clases.forEach(c=>{
const cb=document.querySelector(`input[value="${c.id}"]`);
if(cb.checked){total+=c.precioEditado;sel=true;}
});
document.getElementById("total").textContent=total.toLocaleString('es-AR');
document.getElementById("totalContainer").style.display=sel?"block":"none";
}

function obtenerItems(){
const items=[];
clases.forEach(c=>{
const cb=document.querySelector(`input[value="${c.id}"]`);
if(cb.checked){
items.push({title:`${c.modalidad} (${c.fecha})`,price:c.precioEditado,codigo:c.codigo});
}
});
return items;
}

async function pagarSeleccion(){
const items=obtenerItems();
if(items.length===0) return alert("Seleccioná clases");

document.getElementById("loaderPago").classList.remove("hidden");

const res=await fetch(BACKEND+"/crear-preferencia",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({items,email:correoAlumno})
});
const data=await res.json();
location.href=data.init_point;
}

async function pagarQR(){
const items=obtenerItems();
if(items.length===0) return alert("Seleccioná clases");

document.getElementById("loaderPago").classList.remove("hidden");

const res=await fetch(BACKEND+"/crear-qr",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({items,email:correoAlumno})
});
const data=await res.json();

document.getElementById("loaderPago").classList.add("hidden");

const qrURL="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="+encodeURIComponent(data.qr_data);

document.getElementById("qrImg").src=qrURL;
document.getElementById("qrTotal").textContent=data.total.toLocaleString('es-AR');
document.getElementById("qrModal").style.display="flex";
}

function cerrarQR(){
document.getElementById("qrModal").style.display="none";
}

cargarClases();
</script>

</body>
</html>
