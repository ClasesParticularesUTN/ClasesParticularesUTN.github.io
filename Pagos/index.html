<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clases Particulares UTN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
background:#1a1a24;
color:#fff;
font-family:Poppins;
margin:0;
}

header{
padding:20px;
text-align:center;
background:#252533;
font-weight:700;
font-size:20px;
}

.container{
max-width:600px;
margin:auto;
padding:20px;
padding-bottom:120px;
}

.card{
background:#252533;
padding:18px;
border-radius:18px;
margin-bottom:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.footer{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#252533;
padding:20px;
display:none;
}

.btn{
background:#f3a661;
border:none;
padding:14px 24px;
border-radius:14px;
font-weight:700;
cursor:pointer;
}

.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#1a1a24;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
gap:20px;
z-index:9999;
}

.loader.hidden{
display:none;
}

.qrModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
gap:20px;
z-index:99999;
}

.successBox{
background:#27ae60;
padding:20px;
border-radius:16px;
font-weight:700;
display:none;
}
</style>
</head>

<body>

<header>Registro de pagos</header>

<div class="container" id="productos"></div>

<div class="footer" id="footer">
Total $<span id="total">0</span>
<button class="btn" onclick="pagar()">Pagar</button>
</div>

<div class="loader hidden" id="loader">
<div>Iniciando pago...</div>
</div>

<div class="qrModal" id="qrModal">
<img id="qrImg" style="width:260px">
<div>Escaneá con Mercado Pago</div>
<div class="successBox" id="successMsg">✅ Pago recibido</div>
<button class="btn" onclick="cerrarQR()">Cancelar</button>
</div>

<script>

const GAS = "https://script.google.com/macros/s/AKfycbwvSTFpClvlYupAvfgpR7YTvd90x7AN0t4EJZ5x7xarJ-ga1wRtWxNTDDy-Wm4judEX/exec";
const BACK_PREF = "https://mercadopago-di7q.onrender.com/crear-preferencia";
const BACK_QR = "https://mercadopago-di7q.onrender.com/crear-qr";

let clases=[];
let pollingInterval=null;

const sessionData=sessionStorage.getItem("persona");
const Alumno=sessionData?JSON.parse(sessionData):null;
const correo=Alumno?.correoElectronico;

function esCelular(){
return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
}

async function cargar(){

const r=await fetch(`${GAS}?funcion=devolverDeuda&correo=${correo}`);
const data=await r.json();

clases=data.map((c,i)=>({
id:i,
title:c.modalidad+" "+c.fecha,
price:Number(c.precio),
codigo:c.codigo
}));

render();
}

function render(){

const cont=document.getElementById("productos");
cont.innerHTML="";

clases.forEach(c=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<div>${c.title}</div>
<div>
$${c.price}
<input type="checkbox" value="${c.id}" onchange="calc()">
</div>`;
cont.appendChild(div);
});

}

function calc(){

let t=0;
clases.forEach(c=>{
const cb=document.querySelector(`input[value="${c.id}"]`);
if(cb.checked) t+=c.price;
});

document.getElementById("total").innerText=t;
document.getElementById("footer").style.display=t>0?"block":"none";

}

async function pagar(){

const items=[];
clases.forEach(c=>{
const cb=document.querySelector(`input[value="${c.id}"]`);
if(cb.checked) items.push(c);
});

if(items.length===0) return alert("Seleccioná clases");

document.getElementById("loader").classList.remove("hidden");

try{

if(esCelular()){

const r=await fetch(BACK_PREF,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({items,email:correo})
});

const d=await r.json();

location.href=d.init_point;
return;

}

const r=await fetch(BACK_QR,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({items,email:correo})
});

const d=await r.json();

document.getElementById("loader").classList.add("hidden");

document.getElementById("qrImg").src=
"https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="+encodeURIComponent(d.qr_data);

document.getElementById("qrModal").style.display="flex";

iniciarPolling();

}catch(e){
alert("Error iniciando pago");
document.getElementById("loader").classList.add("hidden");
}

}

function cerrarQR(){
document.getElementById("qrModal").style.display="none";
clearInterval(pollingInterval);
}

function iniciarPolling(){

pollingInterval=setInterval(async()=>{

const r=await fetch(`${GAS}?funcion=verificarPagos&correo=${correo}`);
const ok=await r.text();

if(ok==="OK"){

clearInterval(pollingInterval);

document.getElementById("successMsg").style.display="block";

setTimeout(()=>{
location.reload();
},2000);

}

},4000);

}

cargar();

</script>
</body>
</html>
