<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clases Particulares UTN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
/* ==== TODO TU CSS ORIGINAL SIN QUITAR NADA ==== */
:root {
--primary:#f3a661;
--primary-dark:#d48b45;
--warning:#e67e22;
--bg:#1a1a24;
--header-bg:rgba(37,37,51,0.95);
--card-bg:#252533;
--text-main:#e2e2e8;
--text-muted:#b0b0b8;
--glass-border:rgba(243,166,97,0.25);
--shadow:0 4px 12px rgba(0,0,0,0.3);
--footer-bg:rgba(37,37,51,0.98);
}
body.light-mode{
--bg:#f0f4f8;
--header-bg:rgba(255,255,255,0.95);
--card-bg:#fff;
--text-main:#1a1a24;
--text-muted:#64748b;
--glass-border:rgba(243,166,97,0.4);
--shadow:0 4px 12px rgba(0,0,0,0.08);
--footer-bg:rgba(255,255,255,0.98);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:var(--bg);
color:var(--text-main);
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
header{
background:var(--header-bg);
padding:20px;
display:flex;
justify-content:center;
align-items:center;
border-bottom:1px solid var(--glass-border);
}
header h1{flex-grow:1;text-align:center;}

.theme-toggle{
width:40px;height:40px;border-radius:12px;
background:rgba(243,166,97,.1);
border:1px solid var(--glass-border);
color:var(--primary);
cursor:pointer;
}

.loader{
position:fixed;top:0;left:0;width:100%;height:100%;
background:var(--bg);
display:flex;justify-content:center;align-items:center;
z-index:9999;flex-direction:column;gap:20px;
}
.loader.hidden{display:none;}

.spinner{
border:4px solid rgba(243,166,97,.1);
border-top:4px solid var(--primary);
border-radius:50%;
width:50px;height:50px;
animation:spin 1s linear infinite;
}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

.container{max-width:600px;margin:0 auto;padding:0 15px 140px;}

.card{
display:flex;
justify-content:space-between;
background:var(--card-bg);
padding:18px;
border-radius:18px;
margin-top:15px;
border:1px solid var(--glass-border);
}

.footer-bar{
position:fixed;bottom:0;left:0;width:100%;
background:var(--footer-bg);
padding:15px;
display:none;
}

.btn-pago{
background:var(--primary);
border:none;
padding:14px 25px;
border-radius:16px;
font-weight:700;
cursor:pointer;
margin-left:5px;
}

/* ==== MODAL QR ==== */
.qr-modal{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.8);
display:none;
justify-content:center;
align-items:center;
z-index:99999;
}

.qr-box{
background:var(--card-bg);
padding:30px;
border-radius:20px;
text-align:center;
max-width:320px;
}

.qr-box img{
width:220px;
margin:15px 0;
}

.close-qr{
margin-top:10px;
background:var(--primary);
border:none;
padding:10px 20px;
border-radius:12px;
cursor:pointer;
font-weight:700;
}
</style>
</head>

<body>

<header>
<div style="width:40px"></div>
<h1>Registro de pagos</h1>
<button class="theme-toggle" onclick="toggleTheme()">
<i id="theme-icon" class="fas fa-sun"></i>
</button>
</header>

<div class="container">
<div id="loaderClases" class="loader">
<div class="spinner"></div>
<p>Buscando clases pendientes...</p>
</div>

<div id="loaderPago" class="loader hidden">
<div class="spinner"></div>
<p>Generando pago...</p>
</div>

<div id="productos"></div>
</div>

<div class="footer-bar" id="totalContainer">
<div style="display:flex;justify-content:space-between;align-items:center">
<div>
<div style="font-size:.8rem">TOTAL</div>
<div style="font-size:1.5rem;font-weight:900">$<span id="total">0</span></div>
</div>

<div>
<button class="btn-pago" onclick="pagarSeleccion()">Link</button>
<button class="btn-pago" onclick="pagarQR()">QR</button>
</div>

</div>
</div>

<!-- MODAL QR -->
<div class="qr-modal" id="qrModal">
<div class="qr-box">
<h3>Escaneá para pagar</h3>
<img id="qrImg">
<div>Total: $<span id="qrTotal"></span></div>
<button class="close-qr" onclick="cerrarQR()">Cerrar</button>
</div>
</div>

<script>
const sessionData=sessionStorage.getItem("persona");
let Alumno=sessionData?JSON.parse(sessionData):null;

if(!Alumno) location.href="/Horarios/Login/Login.html";

const correoAlumno=Alumno.correoElectronico;

const GAS_URL="https://script.google.com/macros/s/AKfycbwvSTFpClvlYupAvfgpR7YTvd90x7AN0t4EJZ5x7xarJ-ga1wRtWxNTDDy-Wm4judEX/exec";
const BACKEND_URL="https://mercadopago-di7q.onrender.com";

let clases=[];

function toggleTheme(){
document.body.classList.toggle("light-mode");
}

async function cargarClases(){
document.getElementById("loaderClases").classList.remove("hidden");
const res=await fetch(`${GAS_URL}?funcion=devolverDeuda&correo=${correoAlumno}`);
const data=await res.json();

clases=data.map((c,i)=>({
id:i,
fecha:c.fecha,
modalidad:c.modalidad,
horas:c.horas,
precio:parseFloat(c.precio),
codigo:c.codigo
}));

mostrarClases();
document.getElementById("loaderClases").classList.add("hidden");
}

function mostrarClases(){
const cont=document.getElementById("productos");
cont.innerHTML="";
clases.forEach(c=>{
const d=document.createElement("div");
d.className="card";
d.innerHTML=`
<div>
<strong>${c.modalidad}</strong>
<div>${c.fecha} | ${c.horas}hs</div>
</div>
<div>
<div>$${c.precio}</div>
<input type="checkbox" value="${c.id}" onchange="actualizarTotal()">
</div>`;
cont.appendChild(d);
});
}

function actualizarTotal(){
let t=0,sel=false;
clases.forEach(c=>{
const cb=document.querySelector(`input[value="${c.id}"]`);
if(cb.checked){t+=c.precio;sel=true;}
});
document.getElementById("total").textContent=t;
document.getElementById("totalContainer").style.display=sel?"block":"none";
}

function obtenerItems(){
const items=[];
clases.forEach(c=>{
const cb=document.querySelector(`input[value="${c.id}"]`);
if(cb.checked){
items.push({title:`${c.modalidad} ${c.fecha}`,price:c.precio,codigo:c.codigo});
}
});
return items;
}

async function pagarSeleccion(){
const items=obtenerItems();
if(items.length===0) return alert("Seleccioná clases");

document.getElementById("loaderPago").classList.remove("hidden");

const res=await fetch(BACKEND_URL+"/crear-preferencia",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({items,email:correoAlumno})
});
const data=await res.json();

location.href=data.init_point;
}

async function pagarQR(){
const items=obtenerItems();
if(items.length===0) return alert("Seleccioná clases");

document.getElementById("loaderPago").classList.remove("hidden");

const res=await fetch(BACKEND_URL+"/crear-qr",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({items,email:correoAlumno})
});
const data=await res.json();

document.getElementById("loaderPago").classList.add("hidden");

document.getElementById("qrImg").src="data:image/png;base64,"+data.qr_data;
document.getElementById("qrTotal").textContent=data.total;

document.getElementById("qrModal").style.display="flex";
}

function cerrarQR(){
document.getElementById("qrModal").style.display="none";
}

cargarClases();
</script>

</body>
</html>
