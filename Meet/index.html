<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jitsi Fullscreen</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

#meet {
    width: 100vw;
    height: 100vh;
}
</style>
</head>
<body>

<div id="meet"></div>

<script src="https://meet.jit.si/external_api.js"></script>

<script>
const options = {
    roomName: "SalaClasesParticulares",
    parentNode: document.getElementById("meet"),
    width: "100%",
    height: "100%"
};

const api = new JitsiMeetExternalAPI(
    "meet.jit.si",
    options
);
</script>

</body>
</html>
